name: status-poll

on:
  schedule:
    # Every 5 minutes. GitHub may delay scheduled runs under load (best-effort,
    # typically 5-15 min). Acceptable for outage detection.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

# Prevent overlapping runs if one is slow.
concurrency:
  group: status-poll
  cancel-in-progress: false

permissions:
  contents: write   # so the job can commit the updated state.json

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Poll vendor status pages
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}   # optional
        run: python poll.py

      - name: Commit state if changed
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "status-poller"
            git config user.email "status-poller@users.noreply.github.com"
            git add state.json
            git commit -m "chore: status change $(date -u +%FT%TZ)"
            git push
          else
            echo "no state change to commit"
          fi
